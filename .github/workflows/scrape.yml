name: Update Stream Playlist

on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '*/30 * * * *' # Optional: Auto-update every 30 mins

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright
          # This installs chromium and the system libraries in one go
          npx playwright install chromium --with-deps

      - name: Run Scraper
        timeout-minutes: 2
        run: python your_script.py

      - name: Commit and Push M3U
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # Check if file exists and has changes before committing
          if [ -f live.m3u ]; then
            git add live.m3u
            git commit -m "Update live.m3u [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "live.m3u not found, skipping commit."
          fi
