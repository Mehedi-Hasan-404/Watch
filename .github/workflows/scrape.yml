name: Update Stream Playlist

on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '*/30 * * * *' # Auto-runs every 30 mins

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Removed the 'cache' line that caused the error

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Run Scraper
        timeout-minutes: 2
        run: python your_script.py

      - name: Commit and Push M3U
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f live.m3u ]; then
            git add live.m3u
            git commit -m "Update live.m3u [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "live.m3u not found, skipping commit."
          fi
